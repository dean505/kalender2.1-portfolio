spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kalenderdb}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  kalender:
    mail:
      from: ${MAIL_FROM:no-reply@example.com}
      enabled: ${MAIL_ENABLED:false}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  thymeleaf:
    enabled: false

jwt:
  secret: ${JWT_SECRET:dev-only-change-this-jwt-secret-32-bytes}

app:
  admin:
    seed:
      enabled: ${ADMIN_SEED_ENABLED:false}
      name: ${ADMIN_SEED_NAME:admin}
      email: ${ADMIN_SEED_EMAIL:}
      phone: ${ADMIN_SEED_PHONE:}
      password: ${ADMIN_SEED_PASSWORD:}
